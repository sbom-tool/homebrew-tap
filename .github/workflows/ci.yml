name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  validate:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate formula syntax
        run: ruby -c Formula/sbom-tools.rb

      - name: Tap and audit formula
        run: |
          brew tap-new --no-git sbom-tool/tap
          cp Formula/sbom-tools.rb "$(brew --repository sbom-tool/tap)/Formula/"
          brew audit --formula sbom-tool/tap/sbom-tools

  install-test:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Tap local checkout
        run: |
          mkdir -p "$(brew --prefix)/Homebrew/Library/Taps/sbom-tool"
          ln -s "$GITHUB_WORKSPACE" "$(brew --prefix)/Homebrew/Library/Taps/sbom-tool/homebrew-tap"

      - name: Install from formula
        run: brew install --build-from-source sbom-tool/tap/sbom-tools
        timeout-minutes: 15

      - name: Run formula tests
        run: brew test sbom-tool/tap/sbom-tools

      - name: Verify binary works
        run: |
          sbom-tools --version
          sbom-tools --help
